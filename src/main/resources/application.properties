spring.application.name=fashion-store-system

# DATABASE CONNECTION (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/fashion_store_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / HIBERNATE CONFIGURATION
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# TỰ ĐỘNG SINH BẢNG: 
spring.jpa.hibernate.ddl-auto=update

# Khai báo loại Database đang dùng để Hibernate tối ưu code SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# JWT CONFIGURATION
jwt.secret-key=${JWT_SECRET}
jwt.access-token-expiration=1800000
jwt.refresh-token-expiration=604800000