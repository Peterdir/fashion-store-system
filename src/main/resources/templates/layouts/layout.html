<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$LAYOUT_TITLE - $CONTENT_TITLE">H&Y | H&Y Fashion</title>
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">
    
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <!-- Tailwind Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        secondary: '#b02600',
                        background: '#f9f9f9',
                        surface: '#f9f9f9',
                        'surface-card': '#ffffff',
                        'surface-low': '#f4f3f3',
                        'surface-highest': '#e2e2e2',
                        outline: '#cfc4c5',
                        'surface-container-lowest': '#ffffff',
                        'surface-container-low': '#f3f3f4',
                        'surface-container': '#eeeeee',
                        'surface-container-high': '#e8e8e8',
                        'surface-container-highest': '#e2e2e2',
                        'on-surface': '#1a1c1c',
                        'on-surface-variant': '#474747',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    spacing: {
                        '12': '3rem',
                        '16': '4rem',
                        '24': '6rem',
                    }
                }
            }
        }
    </script>
    
    <style type="text/tailwindcss">
        @layer base {
            body {
                @apply bg-background text-primary font-sans antialiased;
            }
            h1, h2, h3, h4, h5, h6 {
                @apply font-black tracking-tight uppercase;
            }
        }
        @layer components {
            .glass {
                @apply bg-white/85 backdrop-blur-md;
            }
            .no-radius {
                border-radius: 0 !important;
            }
            .editorial-spacing {
                @apply py-16 lg:py-24;
            }
            .no-scrollbar::-webkit-scrollbar {
                display: none;
            }
            .no-scrollbar {
                -ms-overflow-style: none; /* IE and Edge */
                scrollbar-width: none; /* Firefox */
            }
        }
    </style>
    
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="flex flex-col min-h-screen">

    <!-- Header Fragment -->
    <div th:replace="~{fragments/header :: header}"></div>

    <!-- Main Content -->
    <main layout:fragment="content" class="flex-grow">
        <!-- Content will be injected here -->
    </main>

    <!-- Footer Fragment -->
    <div th:replace="~{fragments/footer :: footer}"></div>

    <!-- Mini Cart Fragment -->
    <div th:replace="~{fragments/mini-cart :: mini-cart}"></div>

    <!-- Global Components -->
    <script th:src="@{/js/components/toast.js}"></script>
    <script th:src="@{/js/components/auth-utils.js}"></script>
    <script th:src="@{/js/components/wishlist-utils.js}"></script>
    <script th:src="@{/js/components/cart-utils.js}"></script>
    <script th:src="@{/js/components/mini-cart.js}"></script>
    <script th:src="@{/js/main.js}"></script>
    <!-- Page specific scripts -->
    <th:block layout:fragment="scripts"></th:block>
    <th:block layout:fragment="script"></th:block>
</body>
</html>
