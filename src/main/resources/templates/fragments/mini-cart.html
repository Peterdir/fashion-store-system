<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div th:fragment="mini-cart">
    <!-- Mini Cart Backdrop -->
    <div id="mini-cart-backdrop" class="fixed inset-0 z-[100] bg-black/40 backdrop-blur-sm opacity-0 pointer-events-none transition-opacity duration-300"></div>
    
    <!-- Mini Cart Drawer -->
    <aside id="mini-cart-drawer" class="fixed top-0 right-0 bottom-0 z-[101] w-full max-w-[420px] md:w-[420px] bg-surface flex flex-col transform translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.25,1,0.5,1)] shadow-[-20px_0_40px_rgba(0,0,0,0.08)] border-l border-outline/5">
        <!-- Header -->
        <div class="px-8 py-6 border-b border-outline/5 bg-white flex items-center justify-between shrink-0 shadow-sm z-10">
            <h2 class="text-xs font-black uppercase tracking-[0.3em] flex items-center gap-3">
                Cart <span id="mini-cart-count" class="bg-secondary text-white w-5 h-5 flex items-center justify-center text-[9px] font-sans no-radius">0</span>
            </h2>
            <button id="close-mini-cart" class="text-on-surface-variant hover:text-secondary transition-all hover:rotate-90 duration-300 flex items-center justify-center p-2 -mr-2">
                <span class="material-symbols-outlined text-[22px]">close</span>
            </button>
        </div>
        


        <!-- Scrollable Items -->
        <div id="mini-cart-items" class="flex-grow overflow-y-auto no-scrollbar pt-6 px-8 pb-12 space-y-6">
            <!-- JS will populate items here -->
        </div>

        <!-- Empty State (Hidden initially) -->
        <div id="mini-cart-empty" class="hidden flex-col items-center justify-center h-full px-8 text-center bg-surface-low">
            <span class="material-symbols-outlined text-6xl mb-6 text-outline/30">shopping_bag</span>
            <p class="text-xs font-black uppercase tracking-[0.2em] text-on-surface-variant mb-6">Your cart is empty</p>
            <button id="close-mini-cart-empty" class="border-b-2 border-primary text-[10px] font-black uppercase tracking-widest pb-1 hover:text-secondary hover:border-secondary transition-colors">Start Shopping</button>
        </div>

        <!-- Footer -->
        <div class="border-t border-outline/5 bg-white p-8 shrink-0 shadow-[0_-10px_30px_rgba(0,0,0,0.02)] z-10">
            <div class="flex justify-between items-end mb-6">
                <span class="text-[10px] font-bold uppercase tracking-[0.2em] text-on-surface-variant">Estimated Total</span>
                <span id="mini-cart-total" class="text-2xl font-black text-secondary tracking-tighter">0₫</span>
            </div>
            <div class="grid grid-cols-2 gap-3">
                <a href="/cart" class="flex items-center justify-center bg-white border-2 border-neutral-900 py-4 text-[10px] font-black uppercase tracking-[0.2em] text-neutral-900 hover:bg-neutral-50 transition-colors no-radius">
                    View Bag
                </a>
                <a id="mini-cart-checkout-btn" href="/checkout" class="flex items-center justify-center bg-secondary text-white py-4 text-[10px] font-black uppercase tracking-[0.2em] hover:opacity-90 transition-opacity no-radius shadow-lg shadow-secondary/20">
                    Checkout
                </a>
            </div>
            <p class="text-[9px] text-center text-on-surface-variant/50 uppercase font-bold tracking-widest mt-6">Taxes & shipping calculated at checkout</p>
        </div>
    </aside>
</div>
</body>
</html>
