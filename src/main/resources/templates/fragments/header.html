<header th:fragment="header" class="sticky top-0 z-50 glass">
    <div class="max-w-[1440px] mx-auto px-6 h-20 flex items-center justify-between border-b border-outline/10">
        <!-- Logo -->
        <a th:href="@{/}" class="text-2xl font-black tracking-tighter uppercase leading-none">
            Digital<br><span class="text-secondary">Curator</span>
        </a>

        <!-- Navigation -->
        <nav class="hidden md:flex items-center space-x-12 uppercase text-[11px] font-bold tracking-[0.2em]">
            <a th:href="@{/category}" class="hover:text-secondary transition-colors duration-300">New Arrivals</a>
            <a th:href="@{/category}" class="hover:text-secondary transition-colors duration-300">Collections</a>
            <a th:href="@{/category}" class="hover:text-secondary transition-colors duration-300">Essentials</a>
            <a th:href="@{/category}" class="text-secondary">Sale</a>
        </nav>

        <!-- Actions -->
        <div class="flex items-center space-x-6">
            <button class="uppercase text-[11px] font-bold tracking-[0.1em] hover:text-secondary transition-colors duration-300">Search</button>
            <button class="uppercase text-[11px] font-bold tracking-[0.1em] hover:text-secondary transition-colors duration-300">Cart (0)</button>
        </div>
    </div>
</header>
