<a th:fragment="productCard(product)"
   th:if="${product != null}"
   th:href="@{/product-detail/{id}(id=${product.productId})}"
   class="group block cursor-pointer no-underline text-inherit">
    <!-- Image Wrapper -->
    <div class="relative overflow-hidden bg-surface-low aspect-[3/4] mb-6 group">
        <!-- Main Image -->
        <img th:src="@{${product.primaryImageUrl != null ? product.primaryImageUrl : 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22400%22 viewBox=%220 0 300 400%22%3E%3Crect width=%22300%22 height=%22400%22 fill=%22%23f3f4f6%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2214%22 fill=%22%239ca3af%22%3EImage Not Available%3C/text%3E%3C/svg%3E'}}" 
             th:alt="${product.name}" 
             onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22400%22 viewBox=%220 0 300 400%22%3E%3Crect width=%22300%22 height=%22400%22 fill=%22%23f3f4f6%22/%3E%3Ctext x=%2250%25%22 y=%2250%25%22 dominant-baseline=%22middle%22 text-anchor=%22middle%22 font-family=%22sans-serif%22 font-size=%2214%22 fill=%22%239ca3af%22%3EImage Not Available%3C/text%3E%3C/svg%3E';"
             class="w-full h-full object-cover opacity-100 group-hover:opacity-0 transition-opacity duration-700 ease-in-out">
        
        <!-- Hover Image -->
        <img th:src="@{${product.hoverImageUrl != null ? product.hoverImageUrl : (product.primaryImageUrl != null ? product.primaryImageUrl : 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22400%22 viewBox=%220 0 300 400%22%3E%3Crect width=%22300%22 height=%22400%22 fill=%22%23f3f4f6%22/%3E%3C/svg%3E')}}" 
             th:alt="${product.name}" 
             onerror="this.onerror=null;this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22400%22 viewBox=%220 0 300 400%22%3E%3Crect width=%22300%22 height=%22400%22 fill=%22%23f3f4f6%22/%3E%3C/svg%3E';"
             class="absolute inset-0 w-full h-full object-cover opacity-0 group-hover:opacity-100 transition-opacity duration-700 ease-in-out scale-105 group-hover:scale-100">
        
        <!-- Badges -->
        <div class="absolute top-0 left-0 p-4 flex flex-col space-y-2">
            <span th:if="${product.status != null && product.status.name() == 'ACTIVE'}" class="bg-primary text-white text-[9px] font-bold tracking-[0.2em] uppercase px-3 py-1.5 no-radius">Active</span>
        </div>

        <!-- Quick Buy Overlay -->
        <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity duration-500 flex items-end">
            <button class="w-full bg-primary text-white py-4 text-[10px] font-bold tracking-[0.2em] uppercase translate-y-full group-hover:translate-y-0 transition-transform duration-500 no-radius">
                Quick View +
            </button>
        </div>
    </div>

    <!-- Product Info -->
    <div class="space-y-1.5">
        <h4 class="text-[10px] font-bold tracking-[0.1em] text-neutral-400 uppercase" th:text="${product.category}">CATEGORY</h4>
        <h3 class="text-sm font-medium tracking-tight h-5 overflow-hidden" th:text="${product.name}">Product Name</h3>
        
        <!-- Rating -->
        <div class="flex items-center gap-2" th:if="${product.reviewCount != null && product.reviewCount > 0}">
            <div class="relative inline-flex text-yellow-400/20 material-symbols-outlined select-none text-[12px] leading-none">
                <div class="flex gap-0">
                    <span class="w-[12px] text-center">star</span><span class="w-[12px] text-center">star</span><span class="w-[12px] text-center">star</span><span class="w-[12px] text-center">star</span><span class="w-[12px] text-center">star</span>
                </div>
                <div class="absolute top-0 left-0 overflow-hidden text-yellow-400 whitespace-nowrap" 
                     th:style="|width: ${product.averageRating * 20}%|">
                    <div class="flex gap-0">
                        <span class="w-[12px] text-center">star</span><span class="w-[12px] text-center">star</span><span class="w-[12px] text-center">star</span><span class="w-[12px] text-center">star</span><span class="w-[12px] text-center">star</span>
                    </div>
                </div>
            </div>
            <span class="text-[9px] font-bold text-neutral-400" th:text="${'(' + product.reviewCount + ')'}">(10)</span>
        </div>

        <div class="flex items-center space-x-3 pt-1">
            <p class="text-[11px] font-medium text-neutral-400" 
               th:text="${#numbers.formatDecimal(product.price, 0, 'POINT', 0, 'COMMA') + ' VNĐ'}">0 VNĐ</p>
        </div>
    </div>
</a>
