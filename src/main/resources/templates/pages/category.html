<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title layout:title-pattern="$CONTENT_TITLE">New Arrivals - Digital Curator</title>
</head>
<body>

<div layout:fragment="content">
    <!-- Category Header -->
    <section class="py-4 border-b border-outline/10 bg-white">
        <div class="max-w-[1440px] mx-auto px-6">
            <div class="flex flex-col md:flex-row justify-between items-center">
                <nav class="text-[10px] font-bold tracking-[0.2em] uppercase text-neutral-400 flex justify-center md:justify-start space-x-2">
                    <a th:href="@{/}" class="hover:text-primary transition-colors">Home</a>
                    <span>/</span>
                    <a th:href="@{/category}" class="hover:text-primary transition-colors">Categories</a>
                    <th:block th:if="${keyword != null}">
                        <span>/</span>
                        <span class="text-primary" th:text="${keyword}">Current Category</span>
                    </th:block>
                </nav>
                <div class="flex space-x-12 mt-4 md:mt-0">
                    <button class="text-[11px] font-bold tracking-[0.2em] uppercase border-b border-primary pb-1">Filter (0)</button>
                    <button class="text-[11px] font-bold tracking-[0.2em] uppercase border-b border-primary pb-1">Sort By</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Product Listing Area -->
    <section class="py-12 bg-white">
        <div class="max-w-[1440px] mx-auto px-6">
            <div class="flex flex-col lg:flex-row gap-16">
                
                <!-- Sidebar (Desktop) -->
                <aside class="hidden lg:block w-64 space-y-16 flex-shrink-0">
                    <div>
                        <h3 class="text-xs tracking-[0.3em] font-bold mb-8 text-neutral-400">Categories</h3>
                        <ul class="space-y-4 text-[11px] font-bold tracking-[0.1em] uppercase">
                            <li><a th:href="@{/category}" 
                                   th:classappend="${keyword == null} ? 'text-secondary' : 'hover:text-secondary transition-colors'"
                                   class="transition-colors">All Pieces</a></li>
                            <li th:each="cat : ${categories}">
                                <a th:href="@{/category(keyword=${cat})}" 
                                   th:classappend="${keyword == cat} ? 'text-secondary' : 'hover:text-secondary transition-colors'"
                                   class="transition-colors"
                                   th:text="${cat}">Category</a>
                            </li>
                        </ul>
                    </div>
                </aside>

                <!-- Main Grid -->
            <div class="flex-1">
                    <div th:if="${products.totalElements > 0}" class="grid grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-x-6 gap-y-12">
                        <!-- Product Card Loop -->
                        <th:block th:each="prod : ${products.content}">
                            <div th:replace="~{fragments/components :: productCard(${prod})}"></div>
                        </th:block>
                    </div>

                <!-- Empty State -->
                <div th:if="${products.totalElements == 0}" class="py-24 text-center">
                    <p class="text-neutral-400 font-sans uppercase tracking-widest">No products found for this curation.</p>
                </div>

                <!-- Pagination -->
                <div th:if="${products.totalPages > 1}" class="mt-24 flex items-center justify-center space-x-8">
                    <a th:href="@{/category(page=${products.number - 1}, keyword=${keyword})}" 
                       th:if="${products.hasPrevious()}"
                       class="text-[10px] uppercase font-bold tracking-[0.2em] hover:text-primary transition-colors">Previous</a>
                    
                    <div class="flex space-x-4">
                        <span th:each="i : ${#numbers.sequence(0, products.totalPages - 1)}"
                              th:class="${i == products.number ? 'text-primary' : 'text-neutral-300'}"
                              class="text-[10px] font-bold">
                            <a th:href="@{/category(page=${i}, keyword=${keyword})}" th:text="${i + 1}">1</a>
                        </span>
                    </div>

                    <a th:href="@{/category(page=${products.number + 1}, keyword=${keyword})}" 
                       th:if="${products.hasNext()}"
                       class="text-[10px] uppercase font-bold tracking-[0.2em] hover:text-primary transition-colors">Next</a>
                </div>
            </div>
            </div>
        </div>
    </section>
</div>

</body>
</html>
