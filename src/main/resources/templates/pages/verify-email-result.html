<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title th:text="${success ? 'Verification Success' : 'Verification Failed'}">Email Verification</title>
</head>
<body>
<div layout:fragment="content" class="min-h-[70vh] flex items-center justify-center py-20 px-4 bg-surface">
    <div class="max-w-md w-full text-center space-y-8">
        <!-- Success State -->
        <th:block th:if="${success}">
            <div class="w-24 h-24 bg-green-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="material-symbols-outlined text-5xl text-green-600 animate-bounce">check_circle</span>
            </div>
            <div class="space-y-4">
                <h1 class="text-3xl font-black uppercase tracking-widest text-on-surface">Verified</h1>
                <p class="text-sm text-on-surface-variant leading-relaxed" th:text="${message}">
                    Congratulations! Your account has been successfully verified.
                </p>
            </div>
            <div class="pt-8">
                <a href="/login" class="inline-block px-12 py-4 bg-on-surface text-surface text-[11px] font-black uppercase tracking-[0.2em] transition-all hover:bg-neutral-800">
                    Sign In Now
                </a>
            </div>
        </th:block>

        <!-- Failed State -->
        <th:block th:unless="${success}">
            <div class="w-24 h-24 bg-red-50 rounded-full flex items-center justify-center mx-auto mb-6">
                <span class="material-symbols-outlined text-5xl text-red-600">error</span>
            </div>
            <div class="space-y-4">
                <h1 class="text-3xl font-black uppercase tracking-widest text-on-surface">Oops!</h1>
                <p class="text-sm text-on-surface-variant leading-relaxed" th:text="${message}">
                    Invalid or expired verification link.
                </p>
            </div>
            <div class="pt-8 flex flex-col gap-4">
                <a href="/login" class="inline-block px-12 py-4 bg-on-surface text-surface text-[11px] font-black uppercase tracking-[0.2em] transition-all hover:bg-neutral-800">
                    Back to Sign In
                </a>
                <p class="text-[10px] text-on-surface-variant italic">
                    If you haven't verified your email yet, please try signing in to resend the link.
                </p>
            </div>
        </th:block>
    </div>
</div>
</body>
</html>
