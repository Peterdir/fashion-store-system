<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title>Reset Password</title>
</head>
<body>
    <main layout:fragment="content" class="flex-grow flex flex-col items-center justify-center py-12 px-4 bg-background">
        <!-- Welcome Header -->
        <div class="mb-10 w-full max-w-md text-center space-y-1">
            <p class="text-[10px] font-black tracking-[0.4em] uppercase text-primary/40">H&Y Premium Store</p>
            <h2 class="text-xs font-medium tracking-tight text-on-surface-variant/60 italic">"Style is a way to say who you are without having to speak."</h2>
        </div>

        <!-- Reset Password Card -->
        <div class="w-full max-w-md bg-surface-container-lowest p-10 md:p-12 no-radius shadow-[0_20px_60px_rgba(0,0,0,0.05)] border border-outline/5 text-center">
            <div class="mb-12">
                <h1 class="text-3xl font-black tracking-tighter text-on-surface mb-3 uppercase">Reset Password</h1>
                <p class="text-xs font-medium tracking-tight text-on-surface-variant italic">Enter your new password below to regain access.</p>
            </div>

            <form id="resetPasswordForm" class="space-y-8 text-left">
                <!-- Hidden Token Field -->
                <input type="hidden" id="resetToken" th:value="${#request.getParameter('token')}">

                <!-- New Password Input -->
                <div class="space-y-2">
                    <label class="block text-[9px] font-black uppercase tracking-[0.15em] text-on-surface-variant">New Password</label>
                    <div class="relative group">
                        <input type="password" id="newPassword" 
                               class="w-full px-5 py-4 bg-surface-container-highest border-none no-radius focus:ring-1 focus:ring-primary focus:bg-white transition-all duration-300 text-[11px] font-medium placeholder:text-outline/50 placeholder:italic" 
                               placeholder="Min 8 characters" required>
                        <button type="button" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-lg">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password Input -->
                <div class="space-y-2">
                    <label class="block text-[9px] font-black uppercase tracking-[0.15em] text-on-surface-variant">Confirm New Password</label>
                    <div class="relative group">
                        <input type="password" id="confirmPassword" 
                               class="w-full px-5 py-4 bg-surface-container-highest border-none no-radius focus:ring-1 focus:ring-primary focus:bg-white transition-all duration-300 text-[11px] font-medium placeholder:text-outline/50 placeholder:italic" 
                               placeholder="Repeat your password" required>
                        <button type="button" class="toggle-password absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-lg">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                        class="w-full bg-primary hover:bg-zinc-800 text-white font-black py-5 no-radius transition-all duration-500 active:scale-[0.98] shadow-2xl shadow-black/10 uppercase tracking-[0.25em] text-[10px] mt-4">
                    Update Password
                </button>
            </form>
        </div>
    </main>

    <th:block layout:fragment="scripts">
        <script th:src="@{/js/pages/reset-password.js}"></script>
    </th:block>
</body>
</html>
