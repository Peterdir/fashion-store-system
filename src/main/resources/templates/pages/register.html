<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/layout}">
<head>
    <title>Sign Up</title>
</head>
<body>
    <main layout:fragment="content" class="flex-grow flex flex-col items-center justify-center py-12 px-4 bg-background">
        <!-- Promotional Banner -->
        <div class="mb-10 w-full max-w-md bg-zinc-900 text-white px-4 py-3 text-center no-radius shadow-sm">
            <p class="text-[10px] font-black tracking-[0.2em] uppercase">Join H&Y and get 15% off your first order!</p>
        </div>

        <!-- Register Card -->
        <div class="w-full max-w-lg bg-surface-container-lowest p-10 md:p-12 no-radius shadow-[0_20px_60px_rgba(0,0,0,0.05)] border border-outline/5">
            <div class="mb-12 text-center">
                <h1 class="text-3xl font-black tracking-tighter text-on-surface mb-3 uppercase">Create Account</h1>
                <p class="text-xs font-medium tracking-tight text-on-surface-variant italic">Please fill in the details below to register.</p>
            </div>

            <form id="registerForm" class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <!-- Full Name -->
                <div class="space-y-2 md:col-span-2">
                    <label class="block text-[9px] font-black uppercase tracking-[0.15em] text-on-surface-variant">Full Name</label>
                    <input type="text" id="fullName" 
                           class="w-full px-5 py-4 bg-surface-container-highest border-none no-radius focus:ring-1 focus:ring-primary focus:bg-white transition-all duration-300 text-[11px] font-medium placeholder:text-outline/50 placeholder:italic" 
                           placeholder="Enter your full name" required>
                </div>

                <!-- Phone Number -->
                <div class="space-y-2">
                    <label class="block text-[9px] font-black uppercase tracking-[0.15em] text-on-surface-variant">Phone Number</label>
                    <input type="tel" id="phone" 
                           class="w-full px-5 py-4 bg-surface-container-highest border-none no-radius focus:ring-1 focus:ring-primary focus:bg-white transition-all duration-300 text-[11px] font-medium placeholder:text-outline/50 placeholder:italic" 
                           placeholder="0xxxxxxxxx" required>
                </div>

                <!-- Email Address -->
                <div class="space-y-2">
                    <label class="block text-[9px] font-black uppercase tracking-[0.15em] text-on-surface-variant">Email Address</label>
                    <input type="email" id="email" 
                           class="w-full px-5 py-4 bg-surface-container-highest border-none no-radius focus:ring-1 focus:ring-primary focus:bg-white transition-all duration-300 text-[11px] font-medium placeholder:text-outline/50 placeholder:italic" 
                           placeholder="your@email.com" required>
                </div>

                <!-- Password -->
                <div class="space-y-2">
                    <label class="block text-[9px] font-black uppercase tracking-[0.15em] text-on-surface-variant">Password</label>
                    <div class="relative group">
                        <input type="password" id="password" 
                               class="w-full px-5 py-4 bg-surface-container-highest border-none no-radius focus:ring-1 focus:ring-primary focus:bg-white transition-all duration-300 text-[11px] font-medium placeholder:text-outline/50 placeholder:italic" 
                               placeholder="Min. 8 characters" required>
                        <button type="button" id="togglePassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-lg">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Confirm Password -->
                <div class="space-y-2">
                    <label class="block text-[9px] font-black uppercase tracking-[0.15em] text-on-surface-variant">Confirm Password</label>
                    <div class="relative group">
                        <input type="password" id="confirmPassword" 
                               class="w-full px-5 py-4 bg-surface-container-highest border-none no-radius focus:ring-1 focus:ring-primary focus:bg-white transition-all duration-300 text-[11px] font-medium placeholder:text-outline/50 placeholder:italic" 
                               placeholder="Repeat your password" required>
                        <button type="button" id="toggleConfirmPassword" class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/50 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-lg">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Terms and Conditions -->
                <div class="md:col-span-2 flex items-center space-x-3 pt-2">
                    <input type="checkbox" id="terms" required class="w-4 h-4 text-primary border-outline/20 no-radius focus:ring-0">
                    <label for="terms" class="text-[10px] font-medium text-on-surface-variant">
                        I agree to the <a th:href="@{/policy#terms}" target="_blank" class="text-primary font-black underline underline-offset-2">Terms of Service</a> & <a th:href="@{/policy#privacy}" target="_blank" class="text-primary font-black underline underline-offset-2">Privacy Policy</a>
                    </label>
                </div>

                <!-- Register Button -->
                <button type="submit" 
                        class="md:col-span-2 w-full bg-primary hover:bg-zinc-800 text-white font-black py-5 no-radius transition-all duration-500 active:scale-[0.98] shadow-2xl shadow-black/10 uppercase tracking-[0.25em] text-[10px] mt-4">
                    Create Account
                </button>
            </form>

            <!-- Already have an account? -->
            <div class="text-center pt-8 mt-10 border-t border-outline/5">
                <p class="text-[11px] font-medium tracking-tight text-on-surface-variant">
                    Already have an account? 
                    <a th:href="@{/login}" class="text-primary font-black uppercase tracking-widest ml-2 hover:underline underline-offset-4">Sign In</a>
                </p>
            </div>
        </div>
    </main>

    <th:block layout:fragment="scripts">
        <script th:src="@{/js/pages/register.js}"></script>
    </th:block>
</body>
</html>
