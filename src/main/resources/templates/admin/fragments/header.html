<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head></head>
<body>

<th:block th:fragment="header">
    <header class="sticky top-0 z-20 bg-white border-b border-neutral-100">
        <div class="flex items-center justify-between px-5 py-3 md:px-8">

            <!-- Left: Hamburger + Breadcrumb -->
            <div class="flex items-center gap-4">
                <button @click="sidebarOpen = !sidebarOpen"
                        class="lg:hidden p-1.5 rounded border border-neutral-200 hover:bg-neutral-50 transition-colors">
                    <span class="material-symbols-outlined text-neutral-600">menu</span>
                </button>

                <div class="hidden sm:flex items-center gap-2 text-[10px] font-bold uppercase tracking-[0.15em] text-neutral-400">
                    <a th:href="@{/admin/dashboard}" class="hover:text-accent transition-colors">H&amp;Y Admin</a>
                    <span class="material-symbols-outlined text-[12px]">chevron_right</span>
                    <span class="text-neutral-700" id="admin-breadcrumb-current">Tổng Quan</span>
                </div>
            </div>

            <!-- Right: Actions -->
            <div class="flex items-center gap-3">

                <!-- Notification Bell -->
                <div class="relative" x-data="{ notifOpen: false }" @click.outside="notifOpen = false">
                    <button id="btn-admin-notifications"
                            @click="notifOpen = !notifOpen"
                            class="relative p-2 rounded-full hover:bg-neutral-100 transition-colors group">
                        <span class="material-symbols-outlined text-[20px] text-neutral-500 group-hover:text-primary transition-colors">notifications</span>
                        <!-- Chấm đỏ cho Unread (sẽ được JS toggle) -->
                        <span id="admin-notif-dot" class="hidden absolute top-1.5 right-1.5 w-2 h-2 rounded-full bg-accent"></span>
                    </button>

                    <!-- Dropdown Panel -->
                    <div x-show="notifOpen"
                         x-transition:enter="transition ease-out duration-150"
                         x-transition:enter-start="opacity-0 -translate-y-1"
                         x-transition:enter-end="opacity-100 translate-y-0"
                         x-transition:leave="transition ease-in duration-100"
                         x-transition:leave-start="opacity-100 translate-y-0"
                         x-transition:leave-end="opacity-0 -translate-y-1"
                         class="absolute right-0 top-full mt-1 w-80 bg-white border border-neutral-200 shadow-xl z-50 flex flex-col"
                         style="display: none; max-height: 400px;">
                         
                        <div class="px-4 py-3 border-b border-neutral-100 flex items-center justify-between bg-neutral-50 shrink-0">
                            <span class="text-[11px] font-black uppercase tracking-widest text-neutral-800">Thông báo</span>
                            <button id="btn-read-all-notifs" class="text-[10px] font-bold text-accent hover:text-red-700 transition-colors">
                                Đánh dấu đã đọc
                            </button>
                        </div>

                        <!-- Notification List -->
                        <div id="admin-notif-list" class="overflow-y-auto flex-1 divide-y divide-neutral-50 p-1.5">
                            <div class="py-10 text-center">
                                <span class="material-symbols-outlined text-neutral-200 text-3xl mb-2 animate-spin">sync</span>
                                <p class="text-[11px] text-neutral-400 font-medium">Đang tải...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- User Dropdown -->
                <div class="relative" x-data="{ open: false }" @click.outside="open = false">
                    <button class="flex items-center gap-2 py-1 pl-1 pr-2 rounded-full border border-neutral-200 hover:bg-neutral-50 transition-all"
                            @click="open = !open">
                        <span class="h-7 w-7 rounded-full bg-primary flex items-center justify-center text-white text-[10px] font-black tracking-widest">AD</span>
                        <span class="hidden md:block text-[11px] font-bold text-neutral-700">Admin</span>
                        <span class="material-symbols-outlined text-[16px] text-neutral-400 transition-transform duration-200"
                              :class="open ? 'rotate-180' : ''">expand_more</span>
                    </button>

                    <!-- Dropdown -->
                    <div x-show="open"
                         x-transition:enter="transition ease-out duration-150"
                         x-transition:enter-start="opacity-0 -translate-y-1"
                         x-transition:enter-end="opacity-100 translate-y-0"
                         x-transition:leave="transition ease-in duration-100"
                         x-transition:leave-start="opacity-100 translate-y-0"
                         x-transition:leave-end="opacity-0 -translate-y-1"
                         class="absolute right-0 mt-2 w-48 bg-white border border-neutral-200 rounded-lg shadow-xl py-1 z-50"
                         style="display: none;">

                        <div class="px-4 py-3 border-b border-neutral-100">
                            <p class="text-[12px] font-bold text-neutral-800">Hệ Thống Admin</p>
                            <p class="text-[10px] font-medium text-neutral-400 uppercase tracking-wider">Administrator</p>
                        </div>

                        <div class="py-1">
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="flex w-full items-center gap-2.5 px-4 py-2 text-[11px] font-bold text-red-600 hover:bg-red-50 transition-colors">
                                    <span class="material-symbols-outlined text-[16px]">logout</span>
                                    Đăng xuất
                                </button>
                            </form>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </header>
</th:block>

</body>
</html>
