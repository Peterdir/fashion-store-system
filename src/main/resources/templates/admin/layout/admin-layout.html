<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title layout:title-pattern="$CONTENT_TITLE | H&amp;Y Admin">H&amp;Y Admin</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" th:href="@{/images/favicon.png}">

    <!-- Google Fonts: Inter (Đồng bộ với Customer) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        // Đồng bộ brand H&Y
                        primary: '#000000',
                        accent: '#b02600',
                        surface: {
                            DEFAULT: '#fafafa',
                            card: '#ffffff',
                            low: '#f4f3f3',
                        },
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>

    <!-- Alpine.js (dropdown/toggle) -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    
    <!-- Admin Utilities -->
    <script th:src="@{/admin/js/admin-utils.js}"></script>

    <style>
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d4d4d4; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #a3a3a3; }
    </style>
</head>
<body class="bg-surface text-primary font-sans antialiased" x-data="{ sidebarOpen: false }">

    <div class="flex h-screen overflow-hidden">

        <!-- SIDEBAR -->
        <th:block th:replace="~{admin/fragments/sidebar :: sidebar}"></th:block>

        <!-- MAIN CONTAINER -->
        <div class="relative flex flex-col flex-1 overflow-x-hidden overflow-y-auto">

            <!-- HEADER -->
            <th:block th:replace="~{admin/fragments/header :: header}"></th:block>

            <!-- CONTENT -->
            <main class="w-full grow p-5 md:p-8">
                <div layout:fragment="content"></div>
            </main>

            <!-- FOOTER -->
            <footer class="px-8 py-4 text-[10px] font-medium text-neutral-400 uppercase tracking-widest border-t border-neutral-100">
                &copy; 2026 H&amp;Y H&Y Fashion &mdash; Admin Panel
            </footer>
        </div>
    </div>

</body>
</html>
