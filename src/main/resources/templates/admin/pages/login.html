<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng Nhập — H&amp;Y Admin</title>

    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#000000',
                        accent: '#b02600',
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
</head>
<body class="bg-neutral-50 font-sans antialiased min-h-screen flex items-center justify-center p-4">

    <!-- Login Card -->
    <div class="w-full max-w-[400px]">

        <!-- Brand Header -->
        <div class="text-center mb-10">
            <div class="inline-flex items-center justify-center w-12 h-12 bg-primary mb-4">
                <span class="text-white text-sm font-black tracking-widest">H&amp;Y</span>
            </div>
            <h1 class="text-lg font-black tracking-tight text-primary uppercase">Admin Panel</h1>
            <p class="text-[10px] font-medium text-neutral-400 uppercase tracking-[0.2em] mt-1">Digital Curator — Hệ thống quản trị</p>
        </div>

        <!-- Form Card -->
        <div class="bg-white p-8 md:p-10 border border-neutral-200 shadow-sm">

            <div class="mb-8">
                <h2 class="text-sm font-black uppercase tracking-[0.1em] text-primary">Đăng Nhập</h2>
                <p class="text-[11px] text-neutral-400 mt-1">Nhập thông tin tài khoản quản trị viên.</p>
            </div>

            <!-- Error Message -->
            <div id="admin-login-error" class="hidden mb-6 px-4 py-3 bg-red-50 border border-red-100 text-[11px] font-bold text-red-600 flex items-center gap-2">
                <span class="material-symbols-outlined text-[16px]">error</span>
                <span id="admin-login-error-text">Sai thông tin đăng nhập</span>
            </div>

            <form id="adminLoginForm" class="space-y-5">

                <!-- Email -->
                <div class="space-y-1.5">
                    <label class="block text-[9px] font-black uppercase tracking-[0.15em] text-neutral-500">Email</label>
                    <input type="email" id="admin-email"
                           class="w-full px-4 py-3 bg-neutral-50 border border-neutral-200 text-[12px] font-medium outline-none focus:border-primary focus:bg-white transition-all placeholder:text-neutral-300 placeholder:italic"
                           placeholder="admin@fashion.com" required>
                </div>

                <!-- Password -->
                <div class="space-y-1.5">
                    <label class="block text-[9px] font-black uppercase tracking-[0.15em] text-neutral-500">Mật khẩu</label>
                    <div class="relative">
                        <input type="password" id="admin-password"
                               class="w-full px-4 py-3 pr-10 bg-neutral-50 border border-neutral-200 text-[12px] font-medium outline-none focus:border-primary focus:bg-white transition-all placeholder:text-neutral-300 placeholder:italic"
                               placeholder="Nhập mật khẩu" required>
                        <button type="button" id="admin-toggle-password" class="absolute right-3 top-1/2 -translate-y-1/2 text-neutral-400 hover:text-primary transition-colors">
                            <span class="material-symbols-outlined text-[18px]">visibility</span>
                        </button>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit" id="admin-login-btn"
                        class="w-full bg-primary hover:bg-neutral-800 text-white font-black py-3.5 text-[10px] uppercase tracking-[0.2em] transition-all active:scale-[0.98] flex items-center justify-center gap-2 mt-2">
                    <span id="admin-login-btn-text">Đăng Nhập</span>
                    <span id="admin-login-btn-loading" class="hidden material-symbols-outlined text-[16px] animate-spin">sync</span>
                </button>
            </form>
        </div>

        <!-- Footer -->
        <div class="text-center mt-6">
            <a href="/" class="text-[10px] font-bold text-neutral-400 hover:text-accent transition-colors uppercase tracking-widest flex items-center justify-center gap-1">
                <span class="material-symbols-outlined text-[14px]">arrow_back</span>
                Quay về cửa hàng
            </a>
        </div>
    </div>

    <!-- Login Script -->
    <script>
    document.addEventListener('DOMContentLoaded', () => {
        const form = document.getElementById('adminLoginForm');
        const emailInput = document.getElementById('admin-email');
        const passwordInput = document.getElementById('admin-password');
        const toggleBtn = document.getElementById('admin-toggle-password');
        const loginBtn = document.getElementById('admin-login-btn');
        const btnText = document.getElementById('admin-login-btn-text');
        const btnLoading = document.getElementById('admin-login-btn-loading');
        const errorBox = document.getElementById('admin-login-error');
        const errorText = document.getElementById('admin-login-error-text');

        // Toggle password visibility
        toggleBtn.addEventListener('click', () => {
            const isPass = passwordInput.type === 'password';
            passwordInput.type = isPass ? 'text' : 'password';
            toggleBtn.querySelector('.material-symbols-outlined').textContent = isPass ? 'visibility_off' : 'visibility';
        });

        function showError(msg) {
            errorText.textContent = msg;
            errorBox.classList.remove('hidden');
        }
        function hideError() {
            errorBox.classList.add('hidden');
        }
        function setLoading(loading) {
            loginBtn.disabled = loading;
            if (loading) {
                btnText.textContent = 'Đang xác thực...';
                btnLoading.classList.remove('hidden');
                loginBtn.classList.add('opacity-70', 'cursor-not-allowed');
            } else {
                btnText.textContent = 'Đăng Nhập';
                btnLoading.classList.add('hidden');
                loginBtn.classList.remove('opacity-70', 'cursor-not-allowed');
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            hideError();

            const email = emailInput.value.trim();
            const password = passwordInput.value;

            if (!email || !password) {
                showError('Vui lòng nhập đầy đủ thông tin.');
                return;
            }

            setLoading(true);

            try {
                const response = await fetch('/api/auth/cookie/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password, rememberMe: true })
                });

                const data = await response.json();

                if (response.ok) {
                    // Kiểm tra phải role ADMIN hay không
                    if (data.role !== 'ADMIN') {
                        showError('Tài khoản này không có quyền quản trị.');
                        // Xóa cookie vừa được set (đăng xuất luôn)
                        await fetch('/api/auth/cookie/logout', { method: 'POST' });
                        setLoading(false);
                        return;
                    }

                    // Lưu thông tin admin
                    localStorage.setItem('hy_admin_user', JSON.stringify({
                        userId: data.userId,
                        fullName: data.fullName,
                        email: data.email,
                        role: data.role
                    }));

                    // Hiệu ứng thành công
                    btnText.textContent = 'Thành công!';
                    loginBtn.classList.remove('bg-primary', 'opacity-70');
                    loginBtn.classList.add('bg-emerald-600');

                    setTimeout(() => {
                        window.location.href = '/admin/dashboard';
                    }, 800);
                } else {
                    const msg = data.message || data.error || 'Sai email hoặc mật khẩu.';
                    showError(msg);
                    setLoading(false);
                }
            } catch (err) {
                showError('Không thể kết nối đến máy chủ.');
                setLoading(false);
            }
        });
    });
    </script>

</body>
</html>
